<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3D ЛАНДШАФТ | ВИДЕО НА ЧАСТИЦАХ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .fullscreen-camera {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: #000;
        }

        #cameraVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .action-btn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            border: 3px solid #0ff;
            border-radius: 60px;
            padding: 16px 48px;
            font-size: 26px;
            font-weight: bold;
            color: #0ff;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.6);
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .action-btn:active {
            transform: translateX(-50%) scale(0.96);
            background: #0ff;
            color: #000;
        }

        #studio3D {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: none;
            background: #000;
        }

        #studio3D.active {
            display: block;
        }

        #canvas3d {
            width: 100%;
            height: 100%;
            display: block;
        }

        #backBtn {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 54px;
            height: 54px;
            background: rgba(0,0,0,0.8);
            border: 2px solid #f0f;
            border-radius: 50%;
            color: #f0f;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1002;
            backdrop-filter: blur(8px);
            font-weight: bold;
            transition: 0.2s;
        }

        #backBtn:active {
            background: #f0f;
            color: #000;
            transform: scale(0.92);
        }

        .hint {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0,0,0,0.7);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-family: monospace;
            border: 1px solid #0ff;
            z-index: 1002;
            white-space: nowrap;
            pointer-events: none;
            backdrop-filter: blur(4px);
        }

        .stats {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            color: #0ff;
            font-family: monospace;
            border: 1px solid #0ff;
            z-index: 1002;
            pointer-events: none;
        }

        @media (max-width: 700px) {
            .action-btn {
                padding: 12px 32px;
                font-size: 18px;
                bottom: 30px;
            }
            .hint {
                font-size: 10px;
                bottom: 15px;
            }
            .stats {
                font-size: 9px;
                top: 12px;
                left: 12px;
            }
            #backBtn {
                width: 44px;
                height: 44px;
                font-size: 22px;
            }
        }
    </style>
</head>
<body>

    <div class="fullscreen-camera">
        <video id="cameraVideo" autoplay playsinline muted></video>
    </div>

    <button class="action-btn" id="enter3dBtn">🌀 3D ЛАНДШАФТ</button>

    <div id="studio3D">
        <canvas id="canvas3d"></canvas>
        <div id="backBtn">✕</div>
        <div class="hint">🖱️ ВРАЩАЙ МЫШЬЮ / ПАЛЬЦЕМ</div>
        <div class="stats">📹 ВИДЕО С КАМЕРЫ НА 300K ЧАСТИЦАХ</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        (function() {
            const videoEl = document.getElementById('cameraVideo');
            const enterBtn = document.getElementById('enter3dBtn');
            const studioDiv = document.getElementById('studio3D');
            const canvas3d = document.getElementById('canvas3d');
            const backBtn = document.getElementById('backBtn');
            
            let scene, camera, renderer, particleSystem;
            let videoTexture = null;
            let isDragging = false;
            let prevMouse = { x: 0, y: 0 };
            let rotX = 0.25;
            let rotY = 0.45;
            let targetRotX = 0.25;
            let targetRotY = 0.45;
            
            const PARTICLE_COUNT = 300000;
            const AREA_W = 1500;
            const AREA_H = 900;
            const X_SCALE = 42;
            const Z_SCALE = 25;
            const MAX_HEIGHT = 7.5;
            
            function getHeight(x, z) {
                let nx = x / 58.0;
                let nz = z / 58.0;
                
                let layer1 = Math.sin(nx * 0.65) * Math.cos(nz * 0.65);
                let layer2 = Math.sin(nx * 1.9 + 1.2) * Math.cos(nz * 1.8 + 0.9) * 0.6;
                let layer3 = Math.sin(nx * 4.2 + 2.3) * Math.cos(nz * 4.0 + 1.3) * 0.4;
                let layer4 = Math.sin(nx * 9.5) * 0.2 + Math.cos(nz * 8.7) * 0.2;
                
                let h = (layer1 * 0.9 + layer2 * 0.7 + layer3 * 0.5 + layer4 * 0.3);
                let micro = Math.sin(nx * 22.0) * 0.08 * Math.cos(nz * 21.0);
                h += micro;
                
                let norm = (h + 1.0) / 2.1;
                norm = Math.pow(norm, 1.2);
                
                let edgeX = 1.0 - Math.min(1.0, Math.abs(x) / (AREA_W * 0.45));
                let edgeZ = 1.0 - Math.min(1.0, Math.abs(z) / (AREA_H * 0.45));
                let edge = Math.min(edgeX, edgeZ);
                if (edge < 0.3) edge = 0.3;
                
                return norm * MAX_HEIGHT * (0.7 + edge * 0.45) + 0.8;
            }
            
            async function startCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            facingMode: "user"
                        },
                        audio: false
                    });
                    videoEl.srcObject = stream;
                    await videoEl.play();
                    console.log('✅ Камера запущена');
                    return true;
                } catch (err) {
                    console.error('❌ Ошибка камеры:', err);
                    const canvas = document.createElement('canvas');
                    canvas.width = 1280;
                    canvas.height = 720;
                    const ctx = canvas.getContext('2d');
                    
                    function drawPattern() {
                        ctx.fillStyle = '#0a0a2a';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        ctx.fillStyle = '#0ff';
                        ctx.font = 'bold 32px monospace';
                        ctx.textAlign = 'center';
                        ctx.fillText('📷 КАМЕРА НЕДОСТУПНА', canvas.width/2, canvas.height/2);
                    }
                    drawPattern();
                    
                    const stream = canvas.captureStream(30);
                    videoEl.srcObject = stream;
                    await videoEl.play();
                    return false;
                }
            }
            
            function create3DScene() {
                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x010118);
                scene.fog = new THREE.FogExp2(0x010118, 0.0005);
                
                camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.3, 300);
                camera.position.set(16, 23, 55);
                camera.lookAt(0, 9, 0);
                
                renderer = new THREE.WebGLRenderer({ canvas: canvas3d, alpha: false });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                
                console.log('🎨 Генерация', PARTICLE_COUNT, 'частиц...');
                
                // Генерируем позиции и сохраняем исходные координаты для UV
                const positions = new Float32Array(PARTICLE_COUNT * 3);
                const rxArray = new Float32Array(PARTICLE_COUNT);
                const rzArray = new Float32Array(PARTICLE_COUNT);
                
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    let px = (Math.random() - 0.5) * AREA_W;
                    let pz = (Math.random() - 0.5) * AREA_H;
                    let y = getHeight(px, pz);
                    
                    rxArray[i] = px;
                    rzArray[i] = pz;
                    
                    positions[i*3] = px / X_SCALE;
                    positions[i*3+1] = y;
                    positions[i*3+2] = pz / Z_SCALE;
                }
                
                const geometry = new THREE.BufferGeometry();
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('rx', new THREE.BufferAttribute(rxArray, 1));
                geometry.setAttribute('rz', new THREE.BufferAttribute(rzArray, 1));
                
                // Текстура из видео
                videoTexture = new THREE.VideoTexture(videoEl);
                videoTexture.minFilter = THREE.LinearFilter;
                videoTexture.magFilter = THREE.LinearFilter;
                
                // Шейдеры из рабочего кода
                const vertexShader = `
                    attribute float rx;
                    attribute float rz;
                    
                    varying vec2 vUv;
                    
                    void main() {
                        // UV координаты: от 0 до 1 по всей плоскости
                        vUv = vec2((rx / 1500.0) + 0.5, 1.0 - ((rz / 900.0) + 0.5));
                        
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = 2.8;
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `;
                
                const fragmentShader = `
                    uniform sampler2D videoTexture;
                    uniform float time;
                    
                    varying vec2 vUv;
                    
                    void main() {
                        vec4 color = texture2D(videoTexture, vUv);
                        
                        // Усиление цвета для яркости
                        color.rgb *= 1.2;
                        
                        // Круглая форма частиц
                        vec2 center = gl_PointCoord - 0.5;
                        if (dot(center, center) > 0.25) discard;
                        
                        gl_FragColor = color;
                    }
                `;
                
                const material = new THREE.ShaderMaterial({
                    uniforms: {
                        videoTexture: { value: videoTexture },
                        time: { value: 0 }
                    },
                    vertexShader: vertexShader,
                    fragmentShader: fragmentShader,
                    transparent: true,
                    depthWrite: false,
                    blending: THREE.NormalBlending
                });
                
                particleSystem = new THREE.Points(geometry, material);
                scene.add(particleSystem);
                
                // Звездный фон
                const starCount = 2000;
                const starPositions = new Float32Array(starCount * 3);
                for (let i = 0; i < starCount; i++) {
                    starPositions[i*3] = (Math.random() - 0.5) * 450;
                    starPositions[i*3+1] = (Math.random() - 0.5) * 200 + 20;
                    starPositions[i*3+2] = (Math.random() - 0.5) * 200 - 100;
                }
                const starGeo = new THREE.BufferGeometry();
                starGeo.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
                const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.7 });
                const stars = new THREE.Points(starGeo, starMat);
                scene.add(stars);
                
                // Свет
                const ambientLight = new THREE.AmbientLight(0x222244);
                scene.add(ambientLight);
                const dirLight = new THREE.DirectionalLight(0x88aaff, 0.5);
                dirLight.position.set(8, 25, 5);
                scene.add(dirLight);
                
                console.log('✅ 3D сцена с шейдерами готова');
            }
            
            function setupControls() {
                const element = canvas3d;
                
                const onStart = (e) => {
                    isDragging = true;
                    let clientX, clientY;
                    if (e.touches) {
                        clientX = e.touches[0].clientX;
                        clientY = e.touches[0].clientY;
                        e.preventDefault();
                    } else {
                        clientX = e.clientX;
                        clientY = e.clientY;
                    }
                    prevMouse = { x: clientX, y: clientY };
                };
                
                const onMove = (e) => {
                    if (!isDragging) return;
                    let clientX, clientY;
                    if (e.touches) {
                        clientX = e.touches[0].clientX;
                        clientY = e.touches[0].clientY;
                        e.preventDefault();
                    } else {
                        clientX = e.clientX;
                        clientY = e.clientY;
                    }
                    
                    const deltaX = clientX - prevMouse.x;
                    const deltaY = clientY - prevMouse.y;
                    const sens = 0.007;
                    
                    targetRotY += deltaX * sens;
                    targetRotX += deltaY * sens;
                    targetRotX = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, targetRotX));
                    
                    prevMouse = { x: clientX, y: clientY };
                };
                
                const onEnd = () => {
                    isDragging = false;
                };
                
                element.addEventListener('mousedown', onStart);
                window.addEventListener('mousemove', onMove);
                window.addEventListener('mouseup', onEnd);
                element.addEventListener('touchstart', onStart, { passive: false });
                element.addEventListener('touchmove', onMove, { passive: false });
                element.addEventListener('touchend', onEnd);
            }
            
            let animFrame = null;
            function startRenderLoop() {
                function loop() {
                    if (!studioDiv.classList.contains('active')) {
                        animFrame = requestAnimationFrame(loop);
                        return;
                    }
                    
                    if (particleSystem) {
                        // Плавное вращение
                        rotX += (targetRotX - rotX) * 0.12;
                        rotY += (targetRotY - rotY) * 0.12;
                        particleSystem.rotation.x = rotX;
                        particleSystem.rotation.y = rotY;
                        
                        // Обновляем время в шейдере
                        if (particleSystem.material) {
                            particleSystem.material.uniforms.time.value = performance.now() / 1000;
                        }
                        
                        // Обновляем текстуру видео
                        if (videoTexture && videoEl && videoEl.videoWidth > 0) {
                            videoTexture.needsUpdate = true;
                        }
                        
                        // Динамическая камера
                        const time = Date.now() * 0.002;
                        camera.position.y = 23 + Math.sin(time * 0.25) * 0.3;
                        camera.lookAt(0, 9, 0);
                        
                        renderer.render(scene, camera);
                    }
                    
                    animFrame = requestAnimationFrame(loop);
                }
                loop();
            }
            
            function open3D() {
                if (!scene) {
                    create3DScene();
                    setupControls();
                    startRenderLoop();
                    window.addEventListener('resize', onResize);
                }
                
                document.querySelector('.fullscreen-camera').style.opacity = '0';
                document.querySelector('.fullscreen-camera').style.pointerEvents = 'none';
                studioDiv.classList.add('active');
                
                targetRotX = 0.22;
                targetRotY = 0.48;
                rotX = 0.22;
                rotY = 0.48;
                if (particleSystem) {
                    particleSystem.rotation.x = 0.22;
                    particleSystem.rotation.y = 0.48;
                }
                
                if (videoTexture) {
                    videoTexture.needsUpdate = true;
                }
            }
            
            function close3D() {
                studioDiv.classList.remove('active');
                document.querySelector('.fullscreen-camera').style.opacity = '1';
                document.querySelector('.fullscreen-camera').style.pointerEvents = 'auto';
            }
            
            function onResize() {
                if (camera && renderer) {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                }
            }
            
            // ЗАПУСК
            (async function init() {
                await startCamera();
                enterBtn.addEventListener('click', open3D);
                backBtn.addEventListener('click', close3D);
                console.log('🚀 Готово: шейдеры, видео на 300k частицах');
            })();
        })();
    </script>
</body>
</html>
